services:
  api:
    build:
      context: .
      target: production
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/church_app_db?replicaSet=rs0
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    # Single-node replica set — required for multi-document transactions
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # One-shot container that initialises the replica set
  mongo-init:
    image: mongo:7
    restart: "no"
    depends_on:
      mongo:
        condition: service_healthy
    entrypoint: >
      mongosh --host mongo:27017 --eval
      "try { rs.status() } catch(e) { rs.initiate({ _id:'rs0', members:[{ _id:0, host:'mongo:27017' }] }) }"

volumes:
  mongo_data:
